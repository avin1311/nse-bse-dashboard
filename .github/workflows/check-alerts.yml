name: Check price alerts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Call the check-alerts endpoint
        run: |
          if [ -n "${{ secrets.CHECK_ALERTS_SECRET }}" ]; then
            URL="${{ secrets.DASHBOARD_URL }}/api/check-alerts?secret=${{ secrets.CHECK_ALERTS_SECRET }}"
          else
            URL="${{ secrets.DASHBOARD_URL }}/api/check-alerts"
          fi
          echo "Hitting check-alerts endpoint..."
          curl -sS --max-time 90 "$URL" || echo "Request failed or timed out (the free Render instance may have been asleep and is now waking up)"
